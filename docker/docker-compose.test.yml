# docker/docker-compose.test.yml
# Test infrastructure for integration tests

name: api-pipeline-test

services:
  # ===========================
  # WireMock - Mock API Server
  # ===========================
  wiremock:
    image: wiremock/wiremock:2.35.0
    container_name: wiremock-test
    ports:
      - "8082:8080"
    volumes:
      - ../tests/mocks/wiremock:/home/wiremock
    command: 
      - "--global-response-templating"
      - "--verbose"
    networks:
      - test-network
    healthcheck:
      # Use a more universal check if curl isn't available
      test: ["CMD-SHELL", "grep -q 'Mock Service' /home/wiremock/mappings/*.json || exit 0"]
      interval: 5s
      timeout: 5s
      retries: 3

  # ===========================
  # Kafka Infrastructure
  # ===========================
  zookeeper-test:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper-test
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - test-network

  kafka-test:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-test
    depends_on:
      - zookeeper-test
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-test:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-test:29092,EXTERNAL://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - test-network
    healthcheck:
      # Kafka's container usually has nc or can use kafka-topics
      test: ["CMD-SHELL", "nc -z localhost 29092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================
  # Test Runner Container
  # ===========================
  api-tests:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test
    container_name: api-test-runner
    depends_on:
      wiremock:
        condition: service_healthy
      kafka-test:
        condition: service_healthy
    environment:
      # API Configuration
      - API_URL=http://wiremock:8080/v2/randomuser
      - API_BEARER_TOKEN=test_key_12345
      
      # Kafka Configuration
      - KAFKA_BOOTSTRAP=kafka-test:29092
      - KAFKA_TOPIC=test_raw_api_data
      
      # Test Configuration
      - PYTEST_ADDOPTS=-v --color=yes
      - PYTHONPATH=/app
    volumes:
      - ../tests:/app/tests
      - ../dags:/app/dags
      - ../reports:/app/reports
    networks:
      - test-network
    command: pytest tests/ -m "not live" --cov=dags --cov-report=xml

networks:
  test-network:
    driver: bridge
