
name: API Testing CI

on:
  push:
    branches: ["main"]
    paths:
      - 'dags/api.py'
      - 'tests/**'
      - 'requirements*.txt'
      - '.github/workflows/api-test.yml'
      - 'config/pytest.ini'
  pull_request:
    branches: ["main"]
    paths:
      - 'dags/api.py'
      - 'tests/**'
      - 'requirements*.txt'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - unit
          - integration
          - all
      run_live_tests:
        description: 'Run live API tests (requires secrets)'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.10"
  PIP_CACHE_DIR: ~/.cache/pip

jobs:
  # ===========================
  # Job 1: Setup & Validation
  # ===========================
  setup:
    name: 🔧 Setup & Validate
    runs-on: ubuntu-latest
    outputs:
      test_matrix: ${{ steps.matrix.outputs.result }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate configuration files
        run: |
          echo "🔍 Validating pytest.ini..."
          [ -f config/pytest.ini ] && echo "✅ pytest.ini found" || echo "⚠️ pytest.ini not found"
          
          echo "🔍 Validating test structure..."
          find tests -name "test_*.py" -type f | head -10
          
          echo "🔍 Checking requirements..."
          [ -f requirements-test.txt ] && echo "✅ requirements-test.txt found"
      
      - name: Generate test matrix
        id: matrix
        run: |
          TEST_TYPE="${{ github.event.inputs.test_type || 'all' }}"
          if [ "$TEST_TYPE" = "unit" ]; then
            echo "result=[\"unit\"]" >> $GITHUB_OUTPUT
          elif [ "$TEST_TYPE" = "integration" ]; then
            echo "result=[\"integration\"]" >> $GITHUB_OUTPUT
          else
            echo "result=[\"unit\",\"integration\"]" >> $GITHUB_OUTPUT
          fi

  # ===========================
  # Job 2: Code Quality Checks
  # ===========================
  lint-and-format:
    name: 🎨 Lint & Format
    runs-on: ubuntu-latest
    needs: setup
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install quality tools
        run: |
          pip install --upgrade pip
          pip install black flake8 isort mypy
      
      - name: Check code formatting (Black)
        run: |
          black --check dags/ tests/ --line-length=120
        continue-on-error: true
      
      - name: Check imports (isort)
        run: |
          isort --check-only --diff dags/ tests/
        continue-on-error: true
      
      - name: Run Flake8 linting
        run: |
          flake8 dags/ tests/ \
            --max-line-length=120 \
            --ignore=E203,W503,E501 \
            --max-complexity=10
      
      - name: Type checking with mypy
        run: |
          mypy dags/ --ignore-missing-imports --disable-error-code=var-annotated
        continue-on-error: true

  # ===========================
  # Job 3: Security Scanning
  # ===========================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install security tools
        run: |
          pip install bandit safety pip-audit
      
      - name: Run Bandit (code security)
        run: |
          bandit -r dags/ -f json -o reports/bandit-report.json || true
          bandit -r dags/ -f txt || true
      
      - name: Run Safety (dependency vulnerabilities)
        run: |
          safety check -r requirements-test.txt --json --output reports/safety-report.json || true
          safety check -r requirements-test.txt || true
      
      - name: Run pip-audit
        run: |
          pip-audit -r requirements-test.txt --format json > reports/pip-audit-report.json || true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-reports
          path: reports/*report*.json
          retention-days: 7

  # ===========================
  # Job 4: Unit Tests
  # ===========================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: [setup, lint-and-format, security-scan]
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
          pip install -e .  # ถ้ามี setup.py
      
      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            -m unit \
            --cov=dags \
            --cov-report=xml \
            --cov-report=html:coverage-html \
            --cov-report=term-missing \
            --html=reports/unit-report.html \
            --self-contained-html \
            -n auto  # Parallel execution
      
      - name: Check coverage threshold
        run: |
          coverage report --fail-under=80 || echo "⚠️ Coverage below threshold"
      
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: unit-test-results-${{ matrix.python-version }}
          path: |
            reports/unit-report.html
            coverage.xml
            coverage-html/
          retention-days: 7
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unit-tests
          name: unit-tests-${{ matrix.python-version }}
          fail_ci_if_error: false

  # ===========================
  # Job 5: Integration Tests
  # ===========================
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: [setup, unit-tests]
    if: github.event.inputs.test_type != 'unit'
    
    services:
      # WireMock สำหรับ mock API
      wiremock:
        image: wiremock/wiremock:2.35.0
        ports:
          - 8082:8080
        volumes:
          - ./tests/mocks/wiremock:/home/wiremock
        options: >-
          --health-cmd "curl -f http://localhost:8080/__admin/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      # Kafka สำหรับ integration testing
      kafka:
        image: confluentinc/cp-kafka:7.5.0
        ports:
          - 9092:9092
        environment:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        options: >-
          --health-cmd "kafka-topics --bootstrap-server localhost:9092 --list"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 5
      
      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        environment:
          ZOOKEEPER_CLIENT_PORT: 2181
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      
      - name: Wait for services
        run: |
          echo "⏳ Waiting for WireMock..."
          for i in {1..30}; do
            curl -f http://localhost:8082/__admin/health && break || sleep 2
          done
          
          echo "⏳ Waiting for Kafka..."
          for i in {1..30}; do
            docker exec ${{ job.services.kafka.id }} kafka-topics --bootstrap-server localhost:9092 --list && break || sleep 2
          done
      
      - name: Run integration tests (with WireMock)
        env:
          WIREMOCK_URL: http://localhost:8082
          TEST_API_URL: http://localhost:8082/v2/randomuser
          TEST_API_TOKEN: test_key_12345
          KAFKA_BOOTSTRAP: localhost:9092
          KAFKA_TOPIC: test_raw_api_data
        run: |
          pytest tests/integration/ \
            -v \
            -m "integration and not live" \
            --ignore=tests/integration/test_api_live.py \
            --html=reports/integration-report.html \
            --self-contained-html
      
      - name: Run live API tests (optional - staging)
        if: ${{ github.event.inputs.run_live_tests == 'true' && secrets.API_NINJAS_STAGING_KEY != '' }}
        env:
          TEST_API_URL: https://api.api-ninjas.com/v2/randomuser
          TEST_API_TOKEN: ${{ secrets.API_NINJAS_STAGING_KEY }}
          KAFKA_BOOTSTRAP: localhost:9092
        run: |
          pytest tests/integration/test_api_live.py \
            -v \
            -m "integration and live" \
            --html=reports/live-api-report.html \
            --self-contained-html
        continue-on-error: true
      
      - name: Upload integration test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: integration-test-results
          path: reports/*report*.html
          retention-days: 7

  # ===========================
  # Job 6: Summary Report
  # ===========================
  test-summary:
    name: 📊 Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## 🧪 CI Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "| Test Suite | Python Version | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|---------------|--------|" >> $GITHUB_STEP_SUMMARY
          
          for result in ${{ needs.unit-tests.result }}; do
            echo "| Unit Tests | 3.10/3.11 | $result |" >> $GITHUB_STEP_SUMMARY
          done
          
          if [ "${{ needs.integration-tests.result }}" != "skipped" ]; then
            echo "| Integration Tests | ${{ env.PYTHON_VERSION }} | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Test Report: See 'unit-test-results' artifact" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Test Report: See 'integration-test-results' artifact" >> $GITHUB_STEP_SUMMARY
          echo "- Security Reports: See 'security-reports' artifact" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage Report: [Codecov](https://codecov.io)" >> $GITHUB_STEP_SUMMARY
      
      - name: Check overall status
        run: |
          FAILED_JOBS=0
          
          if [ "${{ needs.unit-tests.result }}" = "failure" ]; then
            FAILED_JOBS=$((FAILED_JOBS + 1))
          fi
          
          if [ "${{ needs.integration-tests.result }}" = "failure" ]; then
            FAILED_JOBS=$((FAILED_JOBS + 1))
          fi
          
          if [ $FAILED_JOBS -gt 0 ]; then
            echo "❌ $FAILED_JOBS test job(s) failed"
            exit 1
          else
            echo "✅ All test jobs passed!"
          fi