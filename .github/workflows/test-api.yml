# .github/workflows/test-api.yml
name: 🔍 API Testing CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'dags/api.py'
      - 'tests/**'
      - 'docker/**'
      - 'requirements*.txt'
      - '.github/workflows/test-api.yml'
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      
      - name: Run unit tests
        run: |
          pytest tests/unit/ -v -m unit --cov=dags --cov-report=xml
      
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage
          path: coverage.xml

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Integration Tests via Docker Compose
        run: |
          docker compose -f docker/docker-compose.test.yml up --build --exit-code-from api-tests
      
      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker/docker-compose.test.yml down

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Lint Tools
        run: pip install flake8 black isort
      - name: Run Black
        run: black --check dags/ tests/ --line-length=120
      - name: Run Flake8
        run: flake8 dags/ tests/ --max-line-length=120 --ignore=E203,W503
