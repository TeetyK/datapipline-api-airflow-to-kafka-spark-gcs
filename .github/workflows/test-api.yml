# CI Pipeline  Airflow DAG

name: DAG Testing CI

on:
  push:
    branches: ["main"]
    paths:
      - 'dags/api.py'
      - 'tests/**'
      - 'requirements*.txt'
      - '.github/workflows/test-dag.yml'
      - 'config/pytest.ini'
  pull_request:
    branches: ["main"]
    paths:
      - 'dags/api.py'
      - 'tests/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  AIRFLOW_HOME: /tmp/airflow_test

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    environment: GCS
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install linting tools
        run: |
          pip install black flake8
      
      - name: Check formatting with Black
        run: |
          black --check dags/ tests/ --line-length=120
        continue-on-error: true
      
      - name: Run Flake8
        run: |
          flake8 dags/ tests/ \
            --max-line-length=120 \
            --ignore=E203,W503

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    environment: GCS
    
    # strategy:
    #   matrix:
    #     python-version: ["3.10", "3.11","3.12"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      
      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            -m unit \
            --cov=dags \
            --cov-report=xml \
            --cov-report=html:coverage-html \
            --cov-report=term-missing \
            --html=reports/unit-report.html \
            --self-contained-html
      
      - name: Check coverage threshold
        run: |
          coverage report --fail-under=70 || echo "⚠️ Coverage below 70%"
      
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ matrix.python-version }}
          path: |
            reports/unit-report.html
            coverage.xml
            coverage-html/
          retention-days: 7
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unit-tests
          name: unit-tests-${{ matrix.python-version }}
          fail_ci_if_error: false

  dag-parsing:
    name: DAG Parsing Check
    runs-on: ubuntu-latest
    needs: lint
    environment: GCS
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Airflow
        run: |
          pip install apache-airflow==2.7.2
          # pip install pendulum
      
      - name: Test DAG can be parsed
        run: |
          # ตั้งค่า AIRFLOW_HOME ชั่วคราว
          export AIRFLOW_HOME=/tmp/airflow_test
          mkdir -p $AIRFLOW_HOME
          
          # Initialize Airflow DB (minimal)
          airflow db init >/dev/null 2>&1 || true
          
          # Try to import the DAG
          python -c "
          import sys
          sys.path.insert(0, 'dags')
          from api import dag
          assert dag is not None
          assert dag.dag_id == 'api_to_kafka_pipeline'
          print(f'✅ DAG parsed successfully: {dag.dag_id}')
          print(f'   Tasks: {[t.task_id for t in dag.tasks]}')
          "
      
      - name: Validate DAG structure
        run: |
          python -c "
          from dags.api import dag
          
          # Check tasks exist
          task_ids = [t.task_id for t in dag.tasks]
          assert 'fetch_api_data' in task_ids
          assert 'produce_to_kafka' in task_ids
          assert 'validate_kafka_delivery' in task_ids
          
          # Check task dependencies
          assert dag.task_dict['fetch_api_data'].downstream_task_ids == {'produce_to_kafka'}
          assert dag.task_dict['produce_to_kafka'].downstream_task_ids == {'validate_kafka_delivery'}
          
          print('✅ DAG structure validated')
          "

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, dag-parsing]
    if: always()
    environment: GCS
    
    steps:
      - name: Generate summary
        run: |
          echo "## 🧪 DAG Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Python Version | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|---------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | - | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | 3.10/3.11 | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DAG Parsing | ${{ env.PYTHON_VERSION }} | ${{ needs.dag-parsing.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check if all passed
          if [ "${{ needs.unit-tests.result }}" = "success" ] && \
             [ "${{ needs.dag-parsing.result }}" = "success" ]; then
            echo "✅ **All checks passed!** 🎉" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some checks failed** - please review" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi