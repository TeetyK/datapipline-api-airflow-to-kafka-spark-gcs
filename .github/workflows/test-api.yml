# CI Pipeline  Airflow DAG

name: DAG Testing CI

on:
  push:
    branches: ["main"]
    paths:
      - 'dags/api.py'
      - 'tests/**'
      - 'requirements*.txt'
      - '.github/workflows/test-dag.yml'
      - 'config/pytest.ini'
  pull_request:
    branches: ["main"]
    paths:
      - 'dags/api.py'
      - 'tests/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  AIRFLOW_HOME: /tmp/airflow_test

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    environment: GCS
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install linting tools
        run: |
          pip install black flake8
      
      - name: Check formatting with Black
        run: |
          black --check dags/ tests/ --line-length=120
        continue-on-error: true
      
      - name: Run Flake8
        run: |
          flake8 dags/ tests/ \
            --max-line-length=120 \
            --ignore=E203,W503

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    environment: GCS
    
    # strategy:
    #   matrix:
    #     python-version: ["3.10", "3.11","3.12"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      
      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            -m unit \
            --cov=dags \
            --cov-report=xml \
            --cov-report=html:coverage-html \
            --cov-report=term-missing \
            --html=reports/unit-report.html \
            --self-contained-html
      
      - name: Check coverage threshold
        run: |
          coverage report --fail-under=70 || echo "⚠️ Coverage below 70%"
      
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ matrix.python-version }}
          path: |
            reports/unit-report.html
            coverage.xml
            coverage-html/
          retention-days: 7
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unit-tests
          name: unit-tests-${{ matrix.python-version }}
          fail_ci_if_error: false

  dag-parsing:
    name: DAG Parsing Check
    runs-on: ubuntu-latest
    needs: lint
    environment: GCS
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Check DAG syntax with Python AST
        run: |
          python << 'EOF'
          import ast
          import sys
          
          print("🔍 Parsing dags/api.py with AST...")
          
          try:
              with open('dags/api.py', 'r', encoding='utf-8') as f:
                  source = f.read()
                  tree = ast.parse(source)
              print("✅ Syntax is valid Python")
          except SyntaxError as e:
              print(f"❌ Syntax error: {e}")
              sys.exit(1)
          
          # Check for DAG() call
          dag_found = False
          dag_id = None
          
          for node in ast.walk(tree):
              if isinstance(node, ast.Call):
                  # Check if calling DAG()
                  if isinstance(node.func, ast.Name) and node.func.id == 'DAG':
                      dag_found = True
                      # Extract dag_id from keyword arguments
                      for kw in node.keywords:
                          if kw.arg == 'dag_id':
                              if isinstance(kw.value, ast.Constant):
                                  dag_id = kw.value.value
                              elif isinstance(kw.value, ast.Str):  # Python <3.8
                                  dag_id = kw.value.s
                              break
                      break
          
          if not dag_found:
              print("❌ No DAG() definition found in file")
              sys.exit(1)
          
          print(f"✅ Found DAG definition: dag_id='{dag_id}'")
          
          # Check for required task_id strings in source
          required_tasks = [
              "task_id='fetch_api_data'",
              "task_id='produce_to_kafka'", 
              "task_id='validate_kafka_delivery'"
          ]
          
          print("\n🔍 Checking for required tasks...")
          for task in required_tasks:
              if task in source:
                  print(f"✅ Found: {task}")
              else:
                  print(f"❌ Missing: {task}")
                  sys.exit(1)
          
          # Check for task dependencies (>> operator)
          if "fetch_data >> produce_kafka >> validate_delivery" in source:
              print("✅ Found task dependencies: fetch_data >> produce_kafka >> validate_delivery")
          else:
              print("⚠️  Task dependency pattern not found (may use different syntax)")
          
          print("\n🎉 DAG structure validation passed!")
          EOF
      
      - name: Check for common issues
        run: |
          python << 'EOF'
          import re
          import sys
          
          print("🔍 Checking for common issues...")
          
          with open('dags/api.py', 'r', encoding='utf-8') as f:
              content = f.read()
          
          issues = []
          
          # Check for load_dotenv() in DAG file (not recommended for Airflow)
          if 'load_dotenv()' in content:
              issues.append("⚠️  load_dotenv() found - Airflow uses env vars directly")
          
          # Check for hardcoded secrets (basic check)
          if re.search(r'["\']sk-[a-zA-Z0-9]{20,}["\']', content):
              issues.append("❌ Possible hardcoded API key detected!")
          
          # Check for API key in headers
          if 'X-API-Key' in content or 'Authorization' in content:
              if 'os.getenv' not in content and 'os.environ' not in content:
                  issues.append("⚠️  API auth found but may not use env vars")
          
          # Check for proper error handling
          if 'try:' in content and 'except' in content:
              print("✅ Found error handling (try/except)")
          else:
              issues.append("⚠️  No try/except blocks found")
          
          # Report
          if issues:
              print("\n⚠️  Issues found:")
              for issue in issues:
                  print(f"   {issue}")
              # Only fail on critical issues
              if any("❌" in i for i in issues):
                  sys.exit(1)
          else:
              print("✅ No common issues detected")
          
          print("\n🎉 Code quality checks passed!")
          EOF

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, dag-parsing]
    if: always()
    environment: GCS
    
    steps:
      - name: Generate summary
        run: |
          echo "## 🧪 DAG Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Python Version | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|---------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | - | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | 3.10/3.11 | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DAG Parsing | ${{ env.PYTHON_VERSION }} | ${{ needs.dag-parsing.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check if all passed
          if [ "${{ needs.unit-tests.result }}" = "success" ] && \
             [ "${{ needs.dag-parsing.result }}" = "success" ]; then
            echo "✅ **All checks passed!** 🎉" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some checks failed** - please review" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi