name: 'Terraform CI'

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: 'Terraform CI'
    runs-on: ubuntu-latest
    environment: GCS
    
    defaults:
      run:
        working-directory: ./terraform

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 1. Authenticate with Google Cloud using JSON from GitHub Secret
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    # 2. Setup Terraform CLI
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # 3. Initialize Terraform (requires a backend config if using GCS)
    - name: Terraform Init
      run: terraform init
      continue-on-error: true
    # 4. Check formatting
    - name: Terraform Format
      run: terraform fmt -check

    # 5. Validate configuration
    - name: Terraform Validate
      run: terraform validate -no-color

    # 6. Generate Plan and output to PR comment (only on PRs)
    - name: Terraform Plan
      id: plan
      if: github.event_name == 'pull_request'
      run: terraform plan -no-color -input=false
      continue-on-error: true
      env:
        TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
        TF_VAR_region: "us-central1"

    # 7. Update PR with the result
    - name: Update Pull Request
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const output = `#### Terraform Format and Style 🖌\`${{ steps.plan.outcome }}\`
          #### Terraform Initialization ⚙️\`${{ steps.plan.outcome }}\`
          #### Terraform Validation 🤖\`${{ steps.plan.outcome }}\`
          #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
          
          <details><summary>Show Plan</summary>
          
          \`\`\`\n
          ${{ steps.plan.outputs.stdout }}
          \`\`\`
          
          </details>
          
          *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })
